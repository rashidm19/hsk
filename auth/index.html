<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('hsk4_theme');if(t==='dark'||(!t&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in | HSK Prep</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth/auth.css">
</head>
<body class="auth-page">

<div class="auth-layout">
  <section class="auth-form-panel">
    <a href="/" class="auth-logo">
      <img src="/logo.svg" alt="HSK Prep" width="108" height="36">
    </a>

    <div class="auth-card">
      <h1 id="auth-title">Sign in to HSK Prep</h1>
      <p class="auth-lead" id="auth-lead">Welcome back! Sign in to access mock exams, vocabulary, and study tools.</p>

      <div class="auth-oauth">
        <button type="button" class="auth-oauth-btn" id="auth-google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.616z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <div class="auth-divider">or</div>

      <form id="auth-form" class="auth-form" novalidate>
        <label class="auth-field" id="auth-name-wrap" hidden>
          <span>Name</span>
          <input type="text" name="name" autocomplete="name" placeholder="Your name">
        </label>
        <label class="auth-field">
          <span>Email address</span>
          <input type="email" name="email" required autocomplete="email" placeholder="Enter your email address">
        </label>
        <label class="auth-field">
          <span>Password</span>
          <input type="password" name="password" required minlength="8" autocomplete="current-password" placeholder="At least 8 characters">
        </label>
        <label class="auth-field" id="auth-country-wrap" hidden>
          <span>Country</span>
          <input type="text" name="country" autocomplete="country-name" placeholder="Your country">
        </label>
        <p class="auth-msg" id="auth-msg" hidden role="status"></p>
        <button type="submit" class="auth-submit" id="auth-submit">Continue</button>
      </form>

      <p class="auth-switch" id="auth-switch">
        Don't have an account? <button type="button" data-switch-mode="signup">Sign up</button>
      </p>
    </div>
  </section>

  <aside class="auth-visual-panel" aria-hidden="true">
    <div class="auth-visual-inner" id="auth-visual-image">
      <!-- Add hero image here, e.g. <img src="/auth/hero.jpg" alt=""> -->
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config/auth.js"></script>
<script src="/auth.js"></script>
<script src="/auth/auth-page.js"></script>
<button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode" onclick="(function(d){var k=d.getAttribute('data-theme')==='dark';if(k){d.removeAttribute('data-theme')}else{d.setAttribute('data-theme','dark')}try{localStorage.setItem('hsk4_theme',k?'light':'dark')}catch(e){}})(document.documentElement)"><svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
</body>
</html>
