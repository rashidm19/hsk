<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('hsk4_theme');if(t==='dark'||(!t&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in… | HSK Prep</title>
<link rel="stylesheet" href="/common.css">
<style>
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .auth-callback-card {
    max-width: 400px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config/auth.js"></script>
<script src="/auth.js"></script>
</head>
<body>
  <div class="auth-callback-card">
    <h1 style="font-size:1.25rem;margin-bottom:8px;">Signing you in…</h1>
    <p style="color:var(--stone);font-size:14px;">Please wait.</p>
  </div>
  <script>
  (async function () {
    var card = document.querySelector('.auth-callback-card');

    function fail(message) {
      card.innerHTML =
        '<h1 style="font-size:1.25rem;margin-bottom:8px;">Sign-in failed</h1>' +
        '<p class="auth-fail-msg" style="color:var(--stone);margin-bottom:16px;"></p>' +
        '<a href="/quiz/" class="btn btn-primary">Try again</a>';
      card.querySelector('.auth-fail-msg').textContent = message;
    }

    try {
      if (!HSKAuth.isConfigured()) throw new Error('Auth is not configured.');

      var params = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var oauthError = params.get('error_description') || params.get('error') || hash.get('error_description') || hash.get('error');
      if (oauthError) throw new Error(decodeURIComponent(oauthError.replace(/\+/g, ' ')));

      var next = HSKAuth.safeNextPath(params.get('next'));
      var client = HSKAuth.getClient();
      var code = params.get('code');
      if (!code) throw new Error('No sign-in code found. Try again.');

      // Pass the bare auth code, NOT the full URL: auth-js sends this argument
      // verbatim as `auth_code`, so a URL makes GoTrue return "flow_state_not_found".
      var result = await client.auth.exchangeCodeForSession(code);
      if (result.error) throw result.error;

      var user = await HSKAuth.getUser();
      if (user) await HSKAuth.upsertProfile(user, {});
      window.location.replace(next);
    } catch (e) {
      fail(e.message || 'Try again from the sign-in page.');
    }
  })();
  </script>
<button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode" onclick="(function(d){var k=d.getAttribute('data-theme')==='dark';if(k){d.removeAttribute('data-theme')}else{d.setAttribute('data-theme','dark')}try{localStorage.setItem('hsk4_theme',k?'light':'dark')}catch(e){}})(document.documentElement)"><svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
</body>
</html>
