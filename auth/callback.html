<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in… | HSK Prep</title>
<link rel="stylesheet" href="/common.css">
<style>
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .auth-callback-card {
    max-width: 400px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config/auth.js"></script>
<script src="/auth.js"></script>
</head>
<body>
  <div class="auth-callback-card">
    <h1 style="font-size:1.25rem;margin-bottom:8px;">Signing you in…</h1>
    <p style="color:var(--stone);font-size:14px;">Please wait.</p>
  </div>
  <script>
  (async function () {
    var card = document.querySelector('.auth-callback-card');

    function fail(message) {
      card.innerHTML =
        '<h1 style="font-size:1.25rem;margin-bottom:8px;">Sign-in failed</h1>' +
        '<p style="color:var(--stone);margin-bottom:16px;">' + message + '</p>' +
        '<a href="/auth/" class="btn btn-primary">Back to sign in</a>';
    }

    try {
      if (!HSKAuth.isConfigured()) throw new Error('Auth is not configured.');

      var params = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var oauthError = params.get('error_description') || params.get('error') || hash.get('error_description') || hash.get('error');
      if (oauthError) throw new Error(decodeURIComponent(oauthError.replace(/\+/g, ' ')));

      var next = HSKAuth.safeNextPath(params.get('next'));
      var client = HSKAuth.getClient();
      var code = params.get('code');

      if (code) {
        await client.auth.exchangeCodeForSession(code);
      } else {
        var session = await HSKAuth.getSession();
        if (!session) throw new Error('No sign-in session found. Try again.');
      }

      var user = await HSKAuth.getUser();
      if (user) await HSKAuth.upsertProfile(user, {});
      window.location.replace(next);
    } catch (e) {
      fail(e.message || 'Try again from the sign-in page.');
    }
  })();
  </script>
</body>
</html>
